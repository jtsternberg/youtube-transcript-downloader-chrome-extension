<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>YouTube Transcript Downloader</title>
	<style>
		body {
			width: 280px;
			padding: 20px;
			font-family: system-ui, -apple-system, sans-serif;
			font-size: 14px;
		}
		h1 {
			font-size: 16px;
			margin: 0 0 16px 0;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		h1 svg {
			width: 24px;
			height: 24px;
			fill: #ff0000;
		}
		button {
			background: #ff0000;
			color: white;
			border: none;
			padding: 12px 16px;
			border-radius: 6px;
			cursor: pointer;
			font-size: 14px;
			width: 100%;
			font-weight: 500;
		}
		button:hover {
			background: #cc0000;
		}
		button:disabled {
			background: #8c959f;
			cursor: not-allowed;
		}
		.status {
			margin-top: 12px;
			padding: 10px;
			border-radius: 6px;
			font-size: 13px;
		}
		.status.success {
			background: #e6f4ea;
			color: #137333;
		}
		.status.error {
			background: #fce8e6;
			color: #c5221f;
		}
		.loading {
			display: none;
			align-items: center;
			justify-content: center;
			gap: 8px;
			margin-top: 12px;
			padding: 10px;
			background: #f2f2f2;
			border-radius: 6px;
			font-size: 13px;
			color: #606060;
		}
		.spinner {
			width: 16px;
			height: 16px;
			border: 2px solid #e1e4e8;
			border-top: 2px solid #ff0000;
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}
		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}
		.not-youtube {
			text-align: center;
			padding: 10px 0;
			color: #606060;
		}

		/* Dark mode */
		@media (prefers-color-scheme: dark) {
			body {
				background: #0f0f0f;
				color: #f1f1f1;
			}
			h1 svg {
				fill: #ff4444;
			}
			button {
				background: #cc0000;
			}
			button:hover {
				background: #ff0000;
			}
			button:disabled {
				background: #3f3f3f;
			}
			.status.success {
				background: #1e3a2f;
				color: #81c995;
			}
			.status.error {
				background: #3a1e1e;
				color: #f28b82;
			}
			.loading {
				background: #272727;
				color: #aaa;
			}
			.spinner {
				border-color: #3f3f3f;
				border-top-color: #ff4444;
			}
			.not-youtube {
				color: #aaa;
			}
		}
	</style>
</head>
<body>
	<h1>
		<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
			<path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
		</svg>
		Transcript
	</h1>

	<div id="not-youtube" class="not-youtube" style="display: none;">
		Navigate to a YouTube video to download its transcript.
	</div>

	<div id="main-content">
		<button id="download-transcript">Download Transcript</button>

		<div id="loading" class="loading">
			<div class="spinner"></div>
			<span>Downloading...</span>
		</div>

		<div id="status" class="status" style="display: none;"></div>
	</div>

	<script src="src/popup.js"></script>
</body>
</html>
